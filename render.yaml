services:
  - type: web
    name: fashionhub-atp
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn fashionhub.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "fashionhub-atp.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fashionhub-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: fashionhub-db
    databaseName: fashionhub
    user: fashionhub_user
