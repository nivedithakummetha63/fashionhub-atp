{% extends 'store/base.html' %}

{% block title %}Delete Product — Fashion Hub ATP{% endblock %}

{% block content %}
<section class="section-pad" style="min-height:70vh; display:flex; align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div class="delete-card text-center">
          <div class="delete-icon"><i class="bi bi-trash3-fill"></i></div>
          <h4 class="delete-title">Delete Product?</h4>
          <p class="delete-msg">
            Are you sure you want to delete<br />
            <strong>"{{ product.name }}"</strong>?<br />
            <span class="text-muted small">This action cannot be undone.</span>
          </p>

          {% if product.image %}
          <div class="delete-img-wrap mb-3">
            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="delete-preview-img" />
          </div>
          {% endif %}

          <form method="post" class="d-flex gap-3 justify-content-center mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger-pink">
              <i class="bi bi-trash-fill me-2"></i>Yes, Delete
            </button>
            <a href="{% url 'all_products' %}" class="btn btn-pink-outline">Cancel</a>
          </form>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
